<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Roof Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0e0d0c; --ink-soft:#3a3834; --ink-muted:#7a7772; --ink-faint:#b8b4ae;
  --paper:#f9f8f5; --surface:#ffffff; --border:#ede9e3; --border-soft:#f4f1ec;
  --red:#c23b2e; --red-bg:#fdf0ee;
  --amber:#a86920; --amber-bg:#fdf4e8;
  --green:#287a50; --green-bg:#edf6f1;
  --purple:#5941a9; --purple-bg:#f0edf9;
  --topbar:60px; --closed:96px; --peek:340px;
  --spring:cubic-bezier(0.32,0.72,0,1);
  --ease:cubic-bezier(0.22,1,0.36,1);
  --r:16px; --rs:10px; --rxs:7px;
}
html,body{height:100%;overflow:hidden;background:var(--paper);font-family:'Inter',sans-serif;font-size:14px;line-height:1.5;color:var(--ink);-webkit-font-smoothing:antialiased}

@keyframes rise     {from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp  {from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fadeIn   {from{opacity:0}to{opacity:1}}
@keyframes breathe  {0%,100%{opacity:1}50%{opacity:.3}}
@keyframes popIn    {0%{transform:scale(.88);opacity:0}60%{transform:scale(1.03)}100%{transform:scale(1);opacity:1}}

/* MAP */
#map{position:fixed;inset:0;z-index:0}
.leaflet-popup-content-wrapper{border-radius:12px!important;box-shadow:0 8px 32px rgba(0,0,0,.14)!important;border:1px solid var(--border)!important;font-family:'Inter',sans-serif!important}
.leaflet-popup-tip-container{display:none!important}

/* TOPBAR */
.topbar{position:fixed;top:0;left:0;right:0;z-index:500;height:var(--topbar);display:flex;align-items:center;justify-content:space-between;padding:0 18px;background:rgba(249,248,245,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(237,233,227,.7)}
.brand{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;letter-spacing:-.4px;color:var(--ink);display:flex;align-items:center;gap:8px}
.brand-dot{width:8px;height:8px;border-radius:50%;background:var(--ink-faint);flex-shrink:0;transition:background .3s}
.brand-dot.ok{background:var(--green)}
.brand-dot.warn{background:var(--amber);animation:breathe 2s ease infinite}
.topbar-right{display:flex;align-items:center;gap:8px}
.tb-pill{height:32px;padding:0 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);font-family:'Inter',sans-serif;font-size:12px;font-weight:500;color:var(--ink-muted);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.tb-pill:hover{border-color:var(--ink-faint);color:var(--ink)}
.tb-pill:active{transform:scale(.97)}
.tb-pill:disabled{opacity:.45;cursor:default}

/* FILTER ROW */
.filter-row{position:fixed;top:calc(var(--topbar) + 10px);left:14px;z-index:490;display:none;gap:6px}
.fpill{height:28px;padding:0 12px;border-radius:14px;border:1px solid rgba(237,233,227,.9);background:rgba(255,255,255,.9);backdrop-filter:blur(12px);font-size:11px;font-weight:600;color:var(--ink-muted);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:4px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.fpill:hover{background:white;color:var(--ink-soft)}
.fpill.on{background:var(--ink);color:white;border-color:var(--ink);box-shadow:0 3px 12px rgba(14,13,12,.2)}
.fpill-n{font-family:'Syne',sans-serif;font-size:12px;font-weight:700}

/* LEGEND */
.legend{position:fixed;bottom:calc(var(--closed) + 12px);left:14px;z-index:490;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border:1px solid rgba(237,233,227,.8);border-radius:var(--rs);padding:10px 13px;display:none;box-shadow:0 2px 12px rgba(0,0,0,.07)}
.legend-hd{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--ink-faint);margin-bottom:6px}
.legend-row{display:flex;align-items:center;gap:7px;font-size:10px;color:var(--ink-muted);margin-bottom:4px}
.legend-row:last-child{margin-bottom:0}
.ldot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.lsq{width:10px;height:10px;border-radius:3px;flex-shrink:0}

/* FAB */
.fab{position:fixed;bottom:calc(var(--closed) + 16px);right:16px;z-index:600;display:none;align-items:center;gap:10px;padding:0 20px;height:52px;background:var(--ink);color:#fff;border:none;border-radius:26px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;letter-spacing:-.2px;cursor:pointer;box-shadow:0 6px 24px rgba(14,13,12,.3),0 2px 6px rgba(14,13,12,.12);transition:all .2s var(--ease);animation:rise .4s var(--ease) both}
.fab:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(14,13,12,.32)}
.fab:active{transform:translateY(0)}
.fab-icon{font-size:17px}
.fab-sub{font-family:'Inter',sans-serif;font-size:9px;font-weight:500;opacity:.6;display:block;margin-top:1px;letter-spacing:0}

/* SHEET */
.sheet{position:fixed;bottom:0;left:0;right:0;z-index:500;background:var(--surface);border-radius:20px 20px 0 0;box-shadow:0 -4px 32px rgba(0,0,0,.10);height:var(--closed);transition:height .38s var(--spring);overflow:hidden;display:flex;flex-direction:column}
.sheet.peek{height:var(--peek)}
.sheet.full{height:calc(100vh - var(--topbar))}
.sheet-handle{flex-shrink:0;padding:12px 0 8px;display:flex;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
.nub{width:32px;height:4px;border-radius:2px;background:var(--border);transition:background .15s}
.sheet-handle:hover .nub{background:var(--ink-faint)}

/* Hero (collapsed) */
.sheet-hero{padding:0 16px 12px;flex-shrink:0}
.hero-card{display:flex;align-items:center;gap:14px;padding:12px 14px;background:var(--paper);border-radius:var(--rs);cursor:pointer;transition:background .15s;-webkit-tap-highlight-color:transparent}
.hero-card:hover{background:#f0ece5}
.hero-left{flex:1;min-width:0}
.hero-eyebrow{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--ink-faint);margin-bottom:3px}
.hero-name{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.hero-meta{font-size:11px;color:var(--ink-muted)}
.hero-score-wrap{text-align:right;flex-shrink:0}
.hero-score{font-family:'Syne',sans-serif;font-size:36px;font-weight:800;line-height:1}
.hero-badge{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px 7px;border-radius:5px;display:inline-block;margin-top:2px}
.hero-btn{flex-shrink:0;height:36px;padding:0 16px;background:var(--ink);color:#fff;border:none;border-radius:var(--rxs);font-family:'Syne',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:opacity .15s;white-space:nowrap}
.hero-btn:hover{opacity:.8}

/* Tabs */
.sheet-tabs{display:none;flex-shrink:0;border-bottom:1px solid var(--border-soft);padding:0 18px}
.sheet.full .sheet-tabs{display:flex}
.stab{padding:10px 0;margin-right:24px;font-size:12px;font-weight:600;color:var(--ink-muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.stab.on{color:var(--ink);border-bottom-color:var(--ink)}
.scontent{flex:1;overflow-y:auto;display:none}
.scontent.on{display:block}
.scontent::-webkit-scrollbar{width:3px}
.scontent::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* Neighborhoods */
.hoods-hdr{padding:14px 18px 10px;display:flex;justify-content:space-between;align-items:center}
.hoods-hdr-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-muted)}
.hoods-count{font-size:10px;font-weight:600;color:var(--ink-muted);background:var(--paper);padding:2px 9px;border-radius:10px;border:1px solid var(--border)}

.hood{margin:0 14px 10px;background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:all .15s;animation:rise .25s var(--ease) both}
.hood:hover{border-color:var(--border);box-shadow:0 4px 16px rgba(0,0,0,.06)}
.hood-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:14px 16px 10px}
.hood-left{flex:1;min-width:0}
.hood-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:4px;line-height:1.2}
.hood-badge{display:inline-block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px 8px;border-radius:5px}
.hood-score-wrap{text-align:right;flex-shrink:0}
.hood-score{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;line-height:1}
.hood-score-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-faint);margin-top:1px}
.hood-facts{display:flex;border-top:1px solid var(--border-soft)}
.hf{flex:1;padding:10px 14px;border-right:1px solid var(--border-soft);text-align:center}
.hf:last-child{border-right:none}
.hf-val{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;line-height:1;margin-bottom:2px}
.hf-lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--ink-faint)}
.hood-actions{display:flex;gap:8px;padding:10px 14px 14px}
.ha-primary{flex:1;height:40px;background:var(--ink);color:#fff;border:none;border-radius:var(--rxs);font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s}
.ha-primary:hover{opacity:.8}
.ha-ghost{height:40px;padding:0 16px;background:var(--paper);color:var(--ink-muted);border:1px solid var(--border);border-radius:var(--rxs);font-family:'Inter',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s}
.ha-ghost:hover{border-color:var(--ink-faint);color:var(--ink)}

/* Leads tab */
.search-wrap{padding:10px 14px 8px;border-bottom:1px solid var(--border-soft);position:sticky;top:0;background:var(--surface);z-index:2}
.search{width:100%;height:36px;padding:0 12px;border:1px solid var(--border);border-radius:var(--rxs);font-family:'Inter',sans-serif;font-size:13px;color:var(--ink);background:var(--paper);outline:none;margin-bottom:8px;transition:border-color .15s}
.search:focus{border-color:var(--ink-faint)}
.search::placeholder{color:var(--ink-faint)}
.chips{display:flex;gap:5px;flex-wrap:wrap}
.chip{font-size:11px;font-weight:600;padding:4px 11px;border-radius:14px;border:1px solid var(--border);background:var(--surface);color:var(--ink-muted);cursor:pointer;transition:all .15s;user-select:none}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.sec-lbl{padding:8px 16px 5px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--ink-faint);background:var(--paper);border-bottom:1px solid var(--border-soft);position:sticky;top:0;z-index:1}
.lrow{display:flex;align-items:flex-start;gap:11px;padding:11px 16px;border-bottom:1px solid var(--border-soft);cursor:pointer;transition:background .1s}
.lrow:hover{background:#faf9f6}
.lrow.active{background:#f8f7f4;border-left:3px solid var(--ink);padding-left:13px}
.lrow.contacted{opacity:.35}
.sbadge{width:38px;height:38px;border-radius:var(--rxs);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:14px;font-weight:800;flex-shrink:0}
.sr{background:var(--red-bg);color:var(--red)}
.sa{background:var(--amber-bg);color:var(--amber)}
.sg{background:var(--green-bg);color:var(--green)}
.linfo{flex:1;min-width:0}
.laddr{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px}
.lcity{font-size:11px;color:var(--ink-muted);margin-bottom:2px}
.lreason{font-size:11px;color:var(--ink-faint);line-height:1.4}
.ltags{display:flex;gap:4px;margin-top:3px;flex-wrap:wrap}
.tag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:.3px}
.tag-s{background:var(--red-bg);color:var(--red)}
.tag-c{background:var(--purple-bg);color:var(--purple)}
.tag-t{background:var(--green-bg);color:var(--green);border:1px solid #c8e8d6}

/* SCREENS */
.screen{position:fixed;inset:0;z-index:700;background:var(--surface);display:none;flex-direction:column;animation:slideUp .3s var(--spring)}
.screen.open{display:flex}
.screen-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid var(--border-soft);flex-shrink:0;background:var(--surface)}
.snav-back{display:flex;align-items:center;gap:5px;height:34px;padding:0 14px;border-radius:var(--rxs);border:1px solid var(--border);background:var(--paper);font-family:'Inter',sans-serif;font-size:12px;font-weight:500;color:var(--ink-muted);cursor:pointer;transition:all .15s}
.snav-back:hover{border-color:var(--ink-faint);color:var(--ink)}
.snav-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--ink-muted)}
.snav-action{height:34px;padding:0 14px;border-radius:var(--rxs);border:1px solid var(--border);background:var(--paper);font-family:'Inter',sans-serif;font-size:12px;font-weight:500;color:var(--ink-muted);cursor:pointer;transition:all .15s}
.snav-action:hover{border-color:var(--ink-faint);color:var(--ink)}

/* House Card */
#houseScreen .sbody{flex:1;overflow-y:auto;padding:28px 22px;display:flex;flex-direction:column;align-items:center;text-align:center}
.hc-stop{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--purple);background:var(--purple-bg);padding:4px 14px;border-radius:20px;margin-bottom:20px}
.hc-ring{width:100px;height:100px;border-radius:50%;border:3px solid currentColor;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 16px;animation:popIn .4s var(--ease) both}
.hc-s{font-family:'Syne',sans-serif;font-size:42px;font-weight:800;line-height:1}
.hc-sl{font-size:9px;text-transform:uppercase;letter-spacing:.6px;opacity:.55;margin-top:2px}
.hc-wave{display:inline-block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:4px 12px;border-radius:6px;margin-bottom:14px}
.hc-addr{font-family:'Syne',sans-serif;font-size:26px;font-weight:700;line-height:1.15;margin-bottom:4px;max-width:360px;animation:rise .35s var(--ease) .05s both}
.hc-city{font-size:14px;color:var(--ink-muted);margin-bottom:20px;animation:rise .35s var(--ease) .1s both}
.hc-stats{display:flex;gap:20px;justify-content:center;margin-bottom:16px;animation:rise .35s var(--ease) .12s both}
.hc-stat{text-align:center}
.hc-stat-v{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;line-height:1}
.hc-stat-l{font-size:9px;text-transform:uppercase;letter-spacing:.4px;color:var(--ink-faint);margin-top:3px}
.hc-reason{font-size:12px;color:var(--ink-muted);line-height:1.55;background:var(--paper);border-radius:var(--rs);padding:11px 16px;max-width:360px;width:100%;margin-bottom:24px;text-align:left;animation:rise .35s var(--ease) .15s both}
.hc-actions{display:flex;gap:10px;width:100%;max-width:360px;margin-bottom:10px;animation:rise .35s var(--ease) .18s both}
.hc-nav{flex:1;height:50px;background:var(--ink);color:#fff;border:none;border-radius:var(--rs);font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.hc-nav:hover{opacity:.8}
.hc-done{flex:1;height:50px;background:var(--paper);color:var(--ink);border:1px solid var(--border);border-radius:var(--rs);font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s}
.hc-done:hover{border-color:var(--ink-faint)}
.hc-outcomes{display:grid;grid-template-columns:1fr 1fr;gap:7px;width:100%;max-width:360px;margin-bottom:8px;animation:rise .2s var(--ease) both}
.hc-out{padding:10px 8px;font-family:'Inter',sans-serif;font-size:11px;font-weight:600;border-radius:var(--rxs);border:1px solid var(--border);background:var(--surface);color:var(--ink-muted);cursor:pointer;transition:all .15s;text-align:center}
.hc-out:hover{border-color:var(--ink-faint);color:var(--ink)}
.hc-out.sel{background:var(--ink);color:#fff;border-color:var(--ink)}
.hc-skip{background:transparent;border:none;font-family:'Inter',sans-serif;font-size:12px;color:var(--ink-faint);cursor:pointer;padding:7px;margin-bottom:4px;transition:color .15s}
.hc-skip:hover{color:var(--ink-muted)}
.hc-prog{display:flex;align-items:center;gap:12px;padding:13px 20px;flex-shrink:0;border-top:1px solid var(--border-soft)}
.hc-pbar{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.hc-pfill{height:100%;background:var(--purple);border-radius:2px;transition:width .4s var(--ease)}
.hc-plbl{font-size:11px;color:var(--ink-faint);white-space:nowrap}
.hc-done-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px 24px}
.hc-done-icon{font-size:56px;margin-bottom:18px}
.hc-done-title{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;margin-bottom:10px}
.hc-done-sub{font-size:14px;color:var(--ink-muted);line-height:1.65;margin-bottom:28px;max-width:290px}
.hc-done-btn{height:46px;padding:0 28px;background:var(--ink);color:#fff;border:none;border-radius:var(--rs);font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .15s}
.hc-done-btn:hover{opacity:.8}

/* Route */
.route-ctrls{display:flex;gap:8px;align-items:center;padding:10px 18px;border-bottom:1px solid var(--border-soft);background:var(--paper);flex-shrink:0}
.route-ctrls label{font-size:11px;color:var(--ink-muted);white-space:nowrap}
.route-ctrls select{font-family:'Inter',sans-serif;font-size:12px;border:1px solid var(--border);border-radius:var(--rxs);padding:5px 10px;background:var(--surface);color:var(--ink);cursor:pointer;outline:none}
.route-summary{padding:11px 18px;font-size:12px;color:var(--ink-muted);border-bottom:1px solid var(--border-soft);background:var(--surface);flex-shrink:0}
.route-stop{display:flex;align-items:flex-start;gap:12px;padding:12px 18px;border-bottom:1px solid var(--border-soft);cursor:pointer;transition:background .1s}
.route-stop:hover{background:#faf9f6}
.route-stop.cur{background:#f0edf9;border-left:3px solid var(--purple);padding-left:15px}
.route-stop.done{opacity:.32}
.stop-num{width:26px;height:26px;border-radius:50%;background:var(--purple);color:#fff;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.route-stop.cur .stop-num{background:var(--ink)}
.route-stop.done .stop-num{background:var(--border);color:var(--ink-muted)}
.stop-info{flex:1;min-width:0}
.stop-addr{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stop-detail{font-size:11px;color:var(--ink-faint);margin-top:1px}
.stop-right{text-align:right;flex-shrink:0}
.stop-score{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;line-height:1}
.stop-dist{font-size:10px;color:var(--ink-faint);margin-top:2px}
.route-empty{padding:36px 24px;text-align:center;font-size:13px;color:var(--ink-muted);line-height:1.6}
.route-footer{padding:13px 18px;border-top:1px solid var(--border-soft);flex-shrink:0}
.route-nav-btn{width:100%;height:48px;background:var(--ink);color:#fff;border:none;border-radius:var(--rs);font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .15s}
.route-nav-btn:hover{opacity:.8}

/* Detail sheet */
.backdrop{position:fixed;inset:0;z-index:750;background:rgba(0,0,0,.28);display:none}
.backdrop.on{display:block;animation:fadeIn .2s ease}
.dsheet{position:fixed;left:0;right:0;bottom:0;z-index:800;background:var(--surface);border-radius:20px 20px 0 0;box-shadow:0 -6px 40px rgba(0,0,0,.14);transform:translateY(100%);transition:transform .32s var(--spring);max-height:92vh;display:flex;flex-direction:column}
.dsheet.open{transform:translateY(0)}
.dsheet-handle{flex-shrink:0;padding:12px 0 6px;display:flex;justify-content:center;cursor:pointer}
.dsbody{flex:1;overflow-y:auto;padding:6px 20px 36px}
.dsbody::-webkit-scrollbar{width:3px}
.dsbody::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.ds-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.ds-sblock{display:flex;align-items:baseline;gap:10px}
.ds-score{font-family:'Syne',sans-serif;font-size:58px;font-weight:800;line-height:1}
.ds-wave{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:3px 9px;border-radius:5px;align-self:center}
.ds-score-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-faint);margin-top:3px}
.ds-close{width:30px;height:30px;background:var(--paper);border:none;border-radius:var(--rxs);cursor:pointer;font-size:13px;color:var(--ink-muted);display:flex;align-items:center;justify-content:center;transition:background .15s;flex-shrink:0}
.ds-close:hover{background:var(--border)}
.ds-addr{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;margin-bottom:2px}
.ds-city{font-size:12px;color:var(--ink-muted);margin-bottom:16px}
.ds-quals{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.dsq{background:var(--paper);border-radius:var(--rs);padding:10px 12px;border:1px solid var(--border-soft)}
.dsq.qr{background:var(--red-bg);border-color:var(--red)}
.dsq.qa{background:var(--amber-bg);border-color:var(--amber)}
.dsq.qg{background:var(--green-bg);border-color:var(--green)}
.dsq.qp{background:var(--purple-bg);border-color:var(--purple)}
.dsq-val{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;line-height:1;margin-bottom:2px}
.dsq.qr .dsq-val{color:var(--red)}.dsq.qa .dsq-val{color:var(--amber)}.dsq.qg .dsq-val{color:var(--green)}.dsq.qp .dsq-val{color:var(--purple)}
.dsq-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--ink-faint)}
.ds-signal{background:var(--paper);border-radius:var(--rs);padding:10px 13px;font-size:12px;color:var(--ink-muted);line-height:1.55;margin-bottom:12px}
.ds-cluster{font-size:11px;color:var(--ink-muted);margin-bottom:12px;border-top:1px solid var(--border-soft);padding-top:10px}
.ds-cluster-row{display:flex;justify-content:space-between;padding:3px 0}
.ds-cluster-row strong{color:var(--ink);font-weight:600}
.ds-btn{width:100%;height:44px;border-radius:var(--rs);font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:7px}
.ds-ghost{background:var(--surface);color:var(--ink-muted);border:1px solid var(--border)}
.ds-ghost:hover{border-color:var(--ink-faint);color:var(--ink)}
.ds-primary{background:var(--ink);color:#fff;border:none}
.ds-primary:hover{opacity:.8}
.ds-primary.contacted{background:var(--green-bg);color:var(--green);border:1px solid var(--green)}
.out-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.out-btn{padding:9px 6px;font-family:'Inter',sans-serif;font-size:11px;font-weight:600;border-radius:var(--rxs);border:1px solid var(--border);background:var(--surface);color:var(--ink-muted);cursor:pointer;transition:all .15s;text-align:center}
.out-btn:hover{border-color:var(--ink-faint);color:var(--ink)}
.out-btn.sel-no_answer{background:#f0f0ee;color:#555;border-color:#c8c4be;font-weight:700}
.out-btn.sel-not_interested{background:var(--red-bg);color:var(--red);border-color:var(--red);font-weight:700}
.out-btn.sel-quote_given{background:var(--amber-bg);color:var(--amber);border-color:var(--amber);font-weight:700}
.out-btn.sel-job_sold{background:var(--green-bg);color:var(--green);border-color:var(--green);font-weight:700}
.out-notes{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--rxs);font-family:'Inter',sans-serif;font-size:12px;color:var(--ink);background:var(--paper);outline:none;resize:none;margin-bottom:8px;transition:border-color .15s}
.out-notes:focus{border-color:var(--ink-faint)}
.out-notes::placeholder{color:var(--ink-faint)}
.vh-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-faint);margin:8px 0 6px}
.vh-item{display:flex;gap:8px;font-size:11px;padding:5px 0;border-bottom:1px solid var(--border-soft)}
.vh-item:last-child{border-bottom:none}
.vh-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;text-transform:uppercase;flex-shrink:0;align-self:flex-start;margin-top:1px}
.vh-no_answer{background:#f0f0ee;color:#666}
.vh-not_interested{background:var(--red-bg);color:var(--red)}
.vh-quote_given{background:var(--amber-bg);color:var(--amber)}
.vh-job_sold{background:var(--green-bg);color:var(--green)}
.vh-meta{color:var(--ink-faint);flex:1}
.vh-note{color:var(--ink-muted);font-style:italic}

/* TOAST */
#toast{position:fixed;bottom:calc(var(--closed) + 14px);left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:9px 20px;border-radius:22px;font-size:12px;font-weight:500;display:none;z-index:1000;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.22);white-space:nowrap;animation:rise .2s var(--ease)}
</style>
</head>
<body>

<div id="map"></div>

<div class="topbar">
  <div class="brand">
    <div class="brand-dot" id="statusDot"></div>
    Roof Intelligence
  </div>
  <div class="topbar-right">
    <button class="tb-pill" id="refreshBtn" onclick="triggerScan()">↻ Scan</button>
    <button class="tb-pill" onclick="exportCSV()">↓ CSV</button>
  </div>
</div>

<div class="filter-row" id="filterRow">
  <div class="fpill on" onclick="setFilter('all',this)"><span class="fpill-n" id="n-all">—</span> All</div>
  <div class="fpill" onclick="setFilter('storm',this)" style="color:var(--red)"><span class="fpill-n" id="n-storm" style="color:var(--red)">—</span> Storm</div>
  <div class="fpill" onclick="setFilter('subdivision',this)" style="color:var(--purple)"><span class="fpill-n" id="n-subdiv" style="color:var(--purple)">—</span> Clusters</div>
</div>

<div class="legend" id="mapLegend">
  <div class="legend-hd">Score</div>
  <div class="legend-row"><div class="ldot" style="background:var(--red);opacity:.7"></div> 80+ Critical</div>
  <div class="legend-row"><div class="ldot" style="background:var(--amber);opacity:.7"></div> 60–79 Active</div>
  <div class="legend-row"><div class="lsq" style="background:var(--purple);opacity:.85"></div> Cluster</div>
</div>

<button class="fab" id="fab" onclick="startNBH()">
  <span class="fab-icon">📍</span>
  <div>Next House<span class="fab-sub">Field mode</span></div>
</button>

<div class="sheet" id="sheet">
  <div class="sheet-handle" onclick="toggleSheet()"><div class="nub"></div></div>
  <div class="sheet-hero" id="sheetHero">
    <div class="hero-card" id="heroCard" onclick="expandSheet()">
      <div class="hero-left">
        <div class="hero-eyebrow">🏆 Top Neighborhood</div>
        <div class="hero-name" id="heroName">Loading…</div>
        <div class="hero-meta" id="heroMeta"></div>
      </div>
      <div class="hero-score-wrap">
        <div class="hero-score" id="heroScore" style="color:var(--ink-faint)">—</div>
        <div class="hero-badge" id="heroBadge"></div>
      </div>
      <button class="hero-btn" id="heroBtn" onclick="event.stopPropagation();heroRoute()" style="display:none">▶ Route</button>
    </div>
  </div>
  <div class="sheet-tabs">
    <div class="stab on" data-tab="hoods" onclick="switchTab('hoods')">Neighborhoods</div>
    <div class="stab" data-tab="leads" onclick="switchTab('leads')">All Leads</div>
  </div>
  <div class="scontent on" id="tab-hoods"></div>
  <div class="scontent" id="tab-leads">
    <div class="search-wrap">
      <input class="search" type="text" placeholder="Search address or city…" oninput="onSearch(this.value)">
      <div class="chips">
        <span class="chip on" data-f="all"         onclick="chipClick(this,'all')">All</span>
        <span class="chip"    data-f="storm"        onclick="chipClick(this,'storm')">⛈ Storm</span>
        <span class="chip"    data-f="subdivision"  onclick="chipClick(this,'subdivision')">🏘 Clusters</span>
        <span class="chip"    data-f="age"          onclick="chipClick(this,'age')">Aging</span>
        <span class="chip"    data-f="high"         onclick="chipClick(this,'high')">80+</span>
      </div>
    </div>
    <div id="leadList"></div>
  </div>
</div>

<!-- HOUSE CARD -->
<div class="screen" id="houseScreen">
  <div class="screen-nav">
    <button class="snav-back" onclick="closeNBH()">← Back</button>
    <span class="snav-title" id="houseTitle">Next Best House</span>
    <span style="width:66px"></span>
  </div>
  <div class="sbody" id="houseCard">
    <div style="color:var(--ink-faint);font-size:13px;margin-top:60px">Getting your location…</div>
  </div>
  <div class="hc-prog" id="hcProg" style="display:none">
    <div class="hc-pbar"><div class="hc-pfill" id="hcFill"></div></div>
    <span class="hc-plbl" id="hcLbl"></span>
  </div>
</div>

<!-- ROUTE -->
<div class="screen" id="routeScreen">
  <div class="screen-nav">
    <button class="snav-back" onclick="closeRoute()">← Back</button>
    <span class="snav-title" id="routeTitle">Canvass Route</span>
    <button class="snav-action" onclick="launchFieldFromRoute()">📍 Field Mode</button>
  </div>
  <div class="route-ctrls">
    <label>Radius</label>
    <select id="cpRadius" onchange="refreshRoute()">
      <option value="300">300m</option><option value="500" selected>500m</option>
      <option value="800">800m</option><option value="1200">1.2km</option><option value="2000">2km</option>
    </select>
    <label style="margin-left:8px">Min score</label>
    <select id="cpMinScore" onchange="refreshRoute()">
      <option value="60">60+</option><option value="70" selected>70+</option><option value="80">80+</option>
    </select>
  </div>
  <div class="route-summary" id="routeSummary">Building route…</div>
  <div class="sbody" id="routeList"></div>
  <div class="route-footer" id="routeFooter" style="display:none">
    <button class="route-nav-btn" id="routeNavBtn" onclick="navToStop()">📍 Navigate to Stop 1</button>
  </div>
</div>

<!-- DETAIL -->
<div class="backdrop" id="backdrop" onclick="closeDetail()"></div>
<div class="dsheet" id="dsheet">
  <div class="dsheet-handle" onclick="closeDetail()"><div class="nub"></div></div>
  <div class="dsbody">
    <div class="ds-hdr">
      <div>
        <div class="ds-sblock">
          <div class="ds-score" id="dsScore"></div>
          <span class="ds-wave" id="dsWave"></span>
        </div>
        <div class="ds-score-lbl">Replacement Score</div>
      </div>
      <button class="ds-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="ds-addr" id="dsAddr"></div>
    <div class="ds-city" id="dsCity"></div>
    <div class="ds-quals" id="dsQuals"></div>
    <div class="ds-signal" id="dsSignal"></div>
    <div class="ds-cluster" id="dsCluster" style="display:none"></div>
    <button class="ds-btn ds-ghost" id="dsNavBtn" onclick="navToDetail()" style="display:none">📍 Navigate there</button>
    <button class="ds-btn ds-primary" id="dsContactBtn" onclick="toggleContacted()">Mark as Contacted</button>
    <div class="out-grid" id="outBar" style="display:none">
      <button class="out-btn" data-o="no_answer"      onclick="setOutcome('no_answer')">🚪 No Answer</button>
      <button class="out-btn" data-o="not_interested"  onclick="setOutcome('not_interested')">✗ Not Interested</button>
      <button class="out-btn" data-o="quote_given"     onclick="setOutcome('quote_given')">📋 Quote Given</button>
      <button class="out-btn" data-o="job_sold"        onclick="setOutcome('job_sold')">🎉 Job Sold!</button>
    </div>
    <textarea class="out-notes" id="outNotes" rows="2" placeholder="Notes…" style="display:none" onblur="saveNotes()"></textarea>
    <div id="visitHist"></div>
  </div>
</div>

<div id="toast"></div>

<script>
'use strict';

let LEADS=[], activeFilter='all', searchQ='', selectedId=null;
let map, markers=[], heatCircles=[];
let sheetState='collapsed';
const CY=new Date().getFullYear();

function waveLabel(s){
  if(s>=90)return{label:'CRITICAL WAVE',color:'var(--red)',   bg:'var(--red-bg)'};
  if(s>=80)return{label:'VERY HIGH',    color:'var(--red)',   bg:'var(--red-bg)'};
  if(s>=70)return{label:'HIGH',         color:'var(--amber)', bg:'var(--amber-bg)'};
  if(s>=60)return{label:'MODERATE',     color:'var(--amber)', bg:'var(--amber-bg)'};
  return         {label:'WATCH LIST',   color:'var(--green)', bg:'var(--green-bg)'};
}
function ownerTenure(built,lastSale){
  if(!built)return 0;
  return Math.max(0,CY-((lastSale&&lastSale>built)?lastSale:built));
}
function tenureLabel(built,lastSale){
  const t=ownerTenure(built,lastSale);if(!t)return null;
  const orig=(!lastSale||lastSale<=(built||0)+2)?' · original':'';
  return `${t}yr owner${orig}`;
}
function sbCls(s){return s>=80?'sr':s>=60?'sa':'sg'}

window.addEventListener('load',async()=>{
  map=L.map('map',{center:[42.95,-71.48],zoom:10,zoomControl:false});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap © CARTO',subdomains:'abcd',maxZoom:19}).addTo(map);
  L.control.zoom({position:'topright'}).addTo(map);
  await loadLeads();
  pollStatus();
  setInterval(pollStatus,5*60*1000);
});

async function pollStatus(){
  const dot=document.getElementById('statusDot');
  try{
    const d=await fetch('/api/health').then(r=>r.json());
    const anyDown=d.scanners?.some(s=>s.status==='down');
    dot.className='brand-dot'+(d.overall==='ok'&&!anyDown?' ok':' warn');
  }catch(e){dot.className='brand-dot warn';}
}

async function loadLeads(){
  try{
    const data=await fetch('/api/leads').then(r=>r.json());
    LEADS=data.leads||[];
    if(!LEADS.length){showEmptyState();return;}
    updateCounts();renderHero();renderHoods();renderLeads();
    document.getElementById('filterRow').style.display='flex';
    document.getElementById('mapLegend').style.display='block';
    document.getElementById('fab').style.display='flex';
    plotMap(LEADS);
    document.getElementById('statusDot').className='brand-dot ok';
  }catch(e){
    document.getElementById('heroName').textContent='Connection error';
    document.getElementById('leadList').innerHTML=`<div style="padding:28px;text-align:center;font-size:13px;color:var(--ink-muted)">${e.message}<br><br><button onclick="loadLeads()" style="padding:9px 18px;background:var(--ink);color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600">Retry</button></div>`;
    document.getElementById('statusDot').className='brand-dot warn';
  }
}

async function triggerScan(){
  const btn=document.getElementById('refreshBtn');
  btn.disabled=true;btn.textContent='Scanning…';
  showToast('Scanning all sources…');
  try{
    const r=await fetch('/api/scan',{method:'POST'});
    const d=await r.json();
    if(!r.ok)throw new Error(d.error||'Scan failed');
    await loadLeads();
    showToast(`${d.count} leads found`);
  }catch(e){showToast('Error: '+e.message);}
  finally{btn.disabled=false;btn.textContent='↻ Scan';}
}

function updateCounts(){
  document.getElementById('n-all').textContent=LEADS.length;
  document.getElementById('n-storm').textContent=LEADS.filter(l=>l.type==='storm').length;
  document.getElementById('n-subdiv').textContent=LEADS.filter(l=>l.id.startsWith('subdiv-')||((l.tags||[]).includes('subdivision')&&l.houseCount)).length;
}

function renderHero(){
  const top=LEADS.filter(l=>l.id.startsWith('subdiv-')||((l.tags||[]).includes('subdivision')&&l.houseCount)).sort((a,b)=>b.score-a.score)[0];
  if(!top){document.getElementById('heroName').textContent='No clusters found';return;}
  const w=waveLabel(top.score);
  document.getElementById('heroName').textContent=top.city;
  document.getElementById('heroMeta').textContent=[top.houseCount?`${top.houseCount} homes`:'',top.avgAge?`~${top.avgAge}-yr roofs`:'',top.avgTenure?`avg ${top.avgTenure}-yr owner`:''].filter(Boolean).join(' · ');
  const sc=document.getElementById('heroScore');sc.textContent=top.score;sc.style.color=w.color;
  const badge=document.getElementById('heroBadge');badge.textContent=w.label;badge.style.color=w.color;badge.style.background=w.bg;
  const btn=document.getElementById('heroBtn');btn.style.display='block';btn._id=top.id;btn._lat=top.lat;btn._lng=top.lng;
}
function heroRoute(){const b=document.getElementById('heroBtn');if(b._id)startRouteFor(b._id,b._lat,b._lng);}

function toggleSheet(){if(sheetState==='collapsed')expandSheet();else collapseSheet();}
function expandSheet(){document.getElementById('sheet').classList.remove('peek');document.getElementById('sheet').classList.add('full');sheetState='full';}
function collapseSheet(){document.getElementById('sheet').classList.remove('full','peek');sheetState='collapsed';}
function switchTab(tab){
  document.querySelectorAll('.stab').forEach(t=>t.classList.toggle('on',t.dataset.tab===tab));
  document.querySelectorAll('.scontent').forEach(c=>c.classList.toggle('on',c.id==='tab-'+tab));
}

function renderHoods(){
  const subdivs=LEADS.filter(l=>l.id.startsWith('subdiv-')||((l.tags||[]).includes('subdivision')&&l.houseCount)).sort((a,b)=>b.score-a.score).slice(0,12);
  const el=document.getElementById('tab-hoods');
  if(!subdivs.length){el.innerHTML='<div style="padding:28px;text-align:center;font-size:13px;color:var(--ink-muted)">No subdivision clusters found.<br>Run a scan to detect replacement waves.</div>';return;}
  el.innerHTML=`<div class="hoods-hdr"><span class="hoods-hdr-title">Replacement Waves</span><span class="hoods-count">${subdivs.length} active</span></div>`
    +subdivs.map((s,i)=>{
      const w=waveLabel(s.score);
      return`<div class="hood" style="animation-delay:${i*.04}s" onclick="selectHood('${s.id}')">
        <div class="hood-top">
          <div class="hood-left">
            <div class="hood-name">${s.city}</div>
            <div class="hood-badge" style="color:${w.color};background:${w.bg}">${w.label}</div>
          </div>
          <div class="hood-score-wrap">
            <div class="hood-score" style="color:${w.color}">${s.score}</div>
            <div class="hood-score-lbl">Score</div>
          </div>
        </div>
        <div class="hood-facts">
          ${s.houseCount?`<div class="hf"><div class="hf-val">${s.houseCount}</div><div class="hf-lbl">Homes</div></div>`:''}
          ${s.avgAge?`<div class="hf"><div class="hf-val">${s.avgAge}yr</div><div class="hf-lbl">Roof Age</div></div>`:''}
          ${s.avgTenure?`<div class="hf"><div class="hf-val">${s.avgTenure}yr</div><div class="hf-lbl">Owner Avg</div></div>`:''}
          ${s.originalOwners?`<div class="hf"><div class="hf-val" style="color:var(--green)">${s.originalOwners}</div><div class="hf-lbl">Original</div></div>`:''}
        </div>
        <div class="hood-actions">
          <button class="ha-primary" onclick="event.stopPropagation();startRouteFor('${s.id}','${s.lat}','${s.lng}')">▶ Start Route</button>
          <button class="ha-ghost" onclick="event.stopPropagation();flyToHood('${s.id}')">Map</button>
        </div>
      </div>`;
    }).join('');
}
function selectHood(id){const l=LEADS.find(x=>x.id===id);if(!l)return;if(l.lat&&l.lng)map.flyTo([l.lat,l.lng],14,{duration:.8});collapseSheet();openDetail(id);}
function flyToHood(id){const s=LEADS.find(l=>l.id===id);if(s?.lat&&s?.lng)map.flyTo([s.lat,s.lng],14,{duration:.8});collapseSheet();}

function visibleLeads(){
  let l=[...LEADS];
  if(activeFilter==='high')l=l.filter(x=>x.score>=80);
  else if(activeFilter==='subdivision')l=l.filter(x=>(x.tags||[]).includes('subdivision')||x.id.startsWith('subdiv-'));
  else if(activeFilter!=='all')l=l.filter(x=>(x.tags||[]).includes(activeFilter)||x.type===activeFilter);
  if(searchQ){const q=searchQ.toLowerCase();l=l.filter(x=>x.address.toLowerCase().includes(q)||x.city.toLowerCase().includes(q));}
  return l.sort((a,b)=>b.score-a.score);
}
function renderLeads(){
  const list=visibleLeads(),c=document.getElementById('leadList');
  if(!list.length){c.innerHTML='<div style="padding:20px;font-size:12px;color:var(--ink-faint);text-align:center">No leads match.</div>';plotMap([]);return;}
  c.innerHTML='';
  [{k:'subdivision',label:'🏘 Subdivision Clusters',match:l=>l.id.startsWith('subdiv-')||((l.tags||[]).includes('subdivision')&&l.houseCount)},
   {k:'storm',label:'⛈ Storm Hits',match:l=>l.type==='storm'&&!l.id.startsWith('subdiv-')},
   {k:'age',label:'🏠 Aging Roofs',match:l=>l.type==='age'&&!l.id.startsWith('subdiv-')&&!(l.tags||[]).includes('subdivision')},
   {k:'realestate',label:'🏡 For Sale',match:l=>l.type==='realestate'},
   {k:'social',label:'💬 Online',match:l=>l.type==='social'},
  ].forEach(sec=>{
    const items=list.filter(sec.match);if(!items.length)return;
    c.innerHTML+=`<div class="sec-lbl">${sec.label} · ${items.length}</div>`;
    items.forEach(lead=>{
      const tLabel=!lead.houseCount&&lead.built?tenureLabel(lead.built,lead.lastSale):null;
      const tags=[(lead.tags||[]).includes('storm')?'<span class="tag tag-s">⛈ storm</span>':'',lead.houseCount?`<span class="tag tag-c">${lead.houseCount} homes</span>`:'',tLabel?`<span class="tag tag-t">${tLabel}</span>`:''].filter(Boolean).join('');
      c.innerHTML+=`<div class="lrow${lead.id===selectedId?' active':''}${lead.contact?' contacted':''}" id="card-${lead.id}" onclick="selectLead('${lead.id}')">

          <div class="lreason">${lead.reason}</div>
          <div class="ltags">${tags}</div>
        </div>
      </div>`;
    });
  });

}
function chipClick(el,f){activeFilter=f;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));el.classList.add('on');renderLeads();}
function setFilter(f,el){

function onSearch(v){searchQ=v;renderLeads();}

function heatStyle(score){
  if(score>=80)return{c:'#c23b2e',f:'#c23b2e',o:.06};
  if(score>=60)return{c:'#a86920',f:'#a86920',o:.06};
  return{c:'#287a50',f:'#287a50',o:.05};
}
function heatR(n){if(n>=150)return 420;if(n>=80)return 320;if(n>=40)return 240;if(n>=20)return 175;if(n>=10)return 130;return 95;}

function plotMap(list){
  markers.forEach(m=>m.remove());markers=[];
  heatCircles.forEach(c=>c.remove());heatCircles=[];
  list.filter(l=>l.id.startsWith('subdiv-')||((l.tags||[]).includes('subdivision')&&l.houseCount)).forEach(s=>{
    if(!s.lat||!s.lng)return;
    const st=heatStyle(s.score),r=heatR(s.houseCount||10);
    const outer=L.circle([s.lat,s.lng],{radius:r*1.5,color:st.c,fillColor:st.f,fillOpacity:st.o*.5,weight:0,interactive:false});
    const inner=L.circle([s.lat,s.lng],{radius:r,color:st.c,fillColor:st.f,fillOpacity:st.o,weight:1.5,opacity:.4,dashArray:'4 3',interactive:false});
    outer.addTo(map);heatCircles.push(outer);inner.addTo(map);heatCircles.push(inner);
  });
  list.forEach(lead=>{
    if(!lead.lat||!lead.lng)return;
    const isC=lead.id.startsWith('subdiv-')||((lead.tags||[]).includes('subdivision')&&lead.houseCount);
    const color=lead.score>=80?'#c23b2e':lead.score>=60?'#a86920':'#287a50';
    let html,sz;
    if(isC){
      sz=Math.max(38,Math.min(54,32+(lead.houseCount||0)/3));
      html=`<div style="width:${sz}px;height:${sz}px;background:#5941a9;border-radius:10px;border:2.5px solid #fff;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 3px 14px rgba(89,65,169,.38);cursor:pointer"><div style="font-family:'Syne',sans-serif;font-weight:800;font-size:12px;color:#fff;line-height:1">${lead.score}</div><div style="font-size:8px;color:rgba(255,255,255,.75)">${lead.houseCount||'?'}🏘</div></div>`;
    }else{
      sz=lead.score>=80?32:lead.score>=60?26:22;
      html=`<div style="width:${sz}px;height:${sz}px;background:${color};border-radius:50%;border:2.5px solid #fff;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:10px;color:#fff;box-shadow:0 2px 10px rgba(0,0,0,.18);cursor:pointer">${lead.score}</div>`;
    }
    const icon=L.divIcon({className:'',html,iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]});
    const m=L.marker([lead.lat,lead.lng],{icon});
    m.on('click',()=>{collapseSheet();openDetail(lead.id);});
    const tLabel=!isC&&lead.built?tenureLabel(lead.built,lead.lastSale):null;
    const extra=isC?`<div style="font-size:10px;color:#5941a9;font-weight:700;margin-top:3px">${lead.houseCount} homes · ${lead.yearRange||lead.built}${lead.avgTenure?` · avg ${lead.avgTenure}-yr owner`:''}</div>`:(tLabel?`<div style="font-size:10px;color:#287a50;margin-top:2px">${tLabel}</div>`:'');
    m.bindPopup(`<div style="font-family:'Inter',sans-serif;font-size:13px;line-height:1.4"><div style="font-weight:700;margin-bottom:2px">${lead.address}</div><div style="font-size:11px;color:#7a7772;margin-bottom:3px">${lead.city}</div><div style="font-size:10px;color:#b8b4ae">${lead.reason}</div>${extra}</div>`);
    m.addTo(map);markers.push(m);
  });
}

function openDetail(id){
  const lead=LEADS.find(l=>String(l.id)===String(id));if(!lead)return;
  selectedId=lead.id;
  if(lead.lat&&lead.lng)map.flyTo([lead.lat,lead.lng],15,{duration:.7});
  const w=waveLabel(lead.score);
  const sc=document.getElementById('dsScore');sc.textContent=lead.score;sc.style.color=w.color;
  const wv=document.getElementById('dsWave');wv.textContent=w.label;wv.style.color=w.color;wv.style.background=w.bg;
  document.getElementById('dsAddr').textContent=lead.address;
  document.getElementById('dsCity').textContent=`${lead.city}${lead.zip?' · '+lead.zip:''}`;
  const age=lead.avgAge||(lead.built?CY-lead.built:0);
  const tenure=lead.avgTenure||ownerTenure(lead.built,lead.lastSale);
  const isOrig=lead.built&&(!lead.lastSale||lead.lastSale<=lead.built+2);
  const quals=[];
  if(age)quals.push(`<div class="dsq ${age>=27?'qr':age>=21?'qa':''}"><div class="dsq-val">${age} yrs</div><div class="dsq-lbl">Roof Age</div></div>`);
  if(tenure)quals.push(`<div class="dsq ${tenure>=15?'qg':''}"><div class="dsq-val">${tenure} yrs</div><div class="dsq-lbl">${isOrig&&!lead.houseCount?'Original Owner':'Owner Tenure'}</div></div>`);
  if(lead.stormHit)quals.push(`<div class="dsq qr"><div class="dsq-val">⚡ Hit</div><div class="dsq-lbl">Storm Zone</div></div>`);
  if(lead.inSubdivision||lead.houseCount)quals.push(`<div class="dsq qp"><div class="dsq-val">${lead.houseCount||'✓'}</div><div class="dsq-lbl">Subdivision${lead.houseCount?' Homes':''}</div></div>`);
  document.getElementById('dsQuals').innerHTML=quals.join('');
  document.getElementById('dsSignal').textContent=lead.reason;
  const cl=document.getElementById('dsCluster');
  if(lead.houseCount){
    cl.style.display='block';
    cl.innerHTML=[`<div class="ds-cluster-row"><span>Homes in wave</span><strong>${lead.houseCount}</strong></div>`,lead.yearRange?`<div class="ds-cluster-row"><span>Built</span><strong>${lead.yearRange}</strong></div>`:'',lead.originalOwners!=null?`<div class="ds-cluster-row"><span>Original owners</span><strong style="color:var(--green)">${lead.originalOwners} of ${lead.houseCount}</strong></div>`:''].filter(Boolean).join('');
  }else cl.style.display='none';
  const nb=document.getElementById('dsNavBtn');
  nb.style.display=(!lead.houseCount&&lead.lat&&lead.lng&&lead.coordSource!=='centroid')?'flex':'none';
  const cb=document.getElementById('dsContactBtn');
  cb.textContent=lead.contact?'✓ Contacted — tap to unmark':'Mark as Contacted';
  cb.className='ds-btn ds-primary'+(lead.contact?' contacted':'');
  const ob=document.getElementById('outBar'),on=document.getElementById('outNotes'),vh=document.getElementById('visitHist');
  if(lead.contact){
    ob.style.display='grid';on.style.display='block';on.value=lead.notes||'';
    document.querySelectorAll('.out-btn').forEach(b=>{b.className='out-btn'+(b.dataset.o===lead.outcome?` sel-${lead.outcome}`:'');});
    renderHistory(lead.history||[]);
  }else{ob.style.display='none';on.style.display='none';vh.innerHTML='';}
  document.getElementById('dsheet').classList.add('open');
  document.getElementById('backdrop').classList.add('on');
}
function closeDetail(){document.getElementById('dsheet').classList.remove('open');document.getElementById('backdrop').classList.remove('on');selectedId=null;}
function navToDetail(){const l=LEADS.find(x=>String(x.id)===String(selectedId));if(!l?.lat||!l?.lng)return;window.open(`https://www.google.com/maps/dir/?api=1&destination=${l.lat},${l.lng}&travelmode=driving`,'_blank');}
async function toggleContacted(){
  const lead=LEADS.find(l=>String(l.id)===String(selectedId));if(!lead)return;
  lead.contact=!lead.contact;lead.contactedAt=lead.contact?new Date().toISOString():null;
  if(!lead.contact){lead.outcome=null;lead.notes='';lead.history=[];}

const OL={no_answer:{label:'No Answer',emoji:'🚪'},not_interested:{label:'Not Interested',emoji:'✗'},quote_given:{label:'Quote Given',emoji:'📋'},job_sold:{label:'Job Sold!',emoji:'🎉'}};
async function setOutcome(outcome){

async function saveNotes(){

function renderHistory(history){

let nbhQueue=[],nbhIdx=0,nbhCenter=null,nbhPending=null;
function startNBH(){
  document.getElementById('houseScreen').classList.add('open');
  document.getElementById('houseTitle').textContent='Next Best House';

  document.getElementById('houseCard').innerHTML='<div style="color:var(--ink-faint);font-size:13px;margin-top:60px">Getting your location…</div>';

function launchFieldFromRoute(){

async function fetchNBH(){
  try{
    const res=await fetch(`/api/canvass?lat=${nbhCenter.lat}&lng=${nbhCenter.lng}&radius=800&minScore=70&limit=40`);
    const data=await res.json();nbhQueue=data.route||[];nbhIdx=0;renderHouseCard();
  }catch(e){document.getElementById('houseCard').innerHTML=`<div style="color:var(--red);font-size:13px;margin-top:60px">Error: ${e.message}</div>`;}

function renderHouseCard(){
  const card=document.getElementById('houseCard'),prog=document.getElementById('hcProg');nbhPending=null;
  if(!nbhQueue.length){card.innerHTML=`<div class="hc-done-state"><div class="hc-done-icon">🏁</div><div class="hc-done-title">No Houses Found</div><div class="hc-done-sub">No uncontacted houses score ≥70 within 800m.<br>Move to a new area and try again.</div><button class="hc-done-btn" onclick="closeNBH()">Back to Map</button></div>`;prog.style.display='none';return;}
  if(nbhIdx>=nbhQueue.length){card.innerHTML=`<div class="hc-done-state"><div class="hc-done-icon">✅</div><div class="hc-done-title">Route Complete!</div><div class="hc-done-sub">You worked all ${nbhQueue.length} houses.<br>Move to a new location to find more leads.</div><button class="hc-done-btn" onclick="closeNBH()">Back to Map</button></div>`;prog.style.display='none';return;}
  const s=nbhQueue[nbhIdx],age=s.built?CY-s.built:0,w=waveLabel(s.score),sc=s.score>=80?'var(--red)':s.score>=60?'var(--amber)':'var(--green)';
  card.innerHTML=`
    <div class="hc-stop">Stop ${nbhIdx+1} of ${nbhQueue.length}</div>
    <div class="hc-ring" style="color:${sc}"><div class="hc-s" style="color:${sc}">${s.score}</div><div class="hc-sl">score</div></div>
    <div class="hc-wave" style="color:${w.color};background:${w.bg}">${w.label}</div>
    <div class="hc-addr">${s.address}</div>
    <div class="hc-city">${s.city}${s.zip?' '+s.zip:''}</div>
    <div class="hc-stats">
      ${age?`<div class="hc-stat"><div class="hc-stat-v" style="color:var(--amber)">${age}</div><div class="hc-stat-l">Roof Age</div></div>`:''}
      ${s.tenure>=5?`<div class="hc-stat"><div class="hc-stat-v" style="color:var(--green)">${s.tenure}</div><div class="hc-stat-l">Owner Yrs</div></div>`:''}
      <div class="hc-stat"><div class="hc-stat-v">${s.distanceLabel}</div><div class="hc-stat-l">Distance</div></div>
      ${s.stormHit?`<div class="hc-stat"><div class="hc-stat-v" style="color:var(--red)">⚡</div><div class="hc-stat-l">Storm</div></div>`:''}
    </div>
    <div class="hc-reason">${s.reason}</div>
    <div class="hc-actions">
      <button class="hc-nav" onclick="nbhNav()">📍 Navigate</button>
      <button class="hc-done" onclick="nbhMarkDone()">✓ Done</button>
    </div>
    <div class="hc-outcomes" id="hcOut" style="display:none">
      ${Object.entries(OL).map(([k,v])=>`<button class="hc-out" data-o="${k}" onclick="nbhSetOut('${k}')">${v.emoji} ${v.label}</button>`).join('')}
    </div>
    <button class="hc-skip" onclick="nbhSkip()">Skip this one</button>`;
  prog.style.display='flex';
  const pct=Math.round((nbhIdx/nbhQueue.length)*100);
  document.getElementById('hcFill').style.width=pct+'%';
  document.getElementById('hcLbl').textContent=`${nbhIdx} of ${nbhQueue.length} done`;
  if(s.lat&&s.lng)map.flyTo([s.lat,s.lng],17,{duration:.6});

function nbhNav(){const s=nbhQueue[nbhIdx];if(!s)return;window.open(`https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lng}&travelmode=driving`,'_blank');}
function nbhMarkDone(){const oc=document.getElementById('hcOut');if(!nbhPending){oc.style.display='grid';return;}nbhCommit();}
function nbhSetOut(o){nbhPending=o;document.querySelectorAll('.hc-out').forEach(b=>b.classList.toggle('sel',b.dataset.o===o));setTimeout(()=>nbhCommit(),320);}
async function nbhCommit(){
  const s=nbhQueue[nbhIdx];if(!s)return;
  try{await fetch('/api/contact',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:s.id,contacted:true,outcome:nbhPending||''})});const lead=LEADS.find(l=>l.id===s.id);if(lead){lead.contact=true;lead.contactedAt=new Date().toISOString();lead.outcome=nbhPending||null;}}catch(e){}
  const ol=nbhPending?OL[nbhPending]:null;if(ol)showToast(`${ol.emoji} ${ol.label}`);
  nbhPending=null;nbhIdx++;renderHouseCard();

function nbhSkip(){nbhIdx++;renderHouseCard();}
function closeNBH(){document.getElementById('houseScreen').classList.remove('open');nbhQueue=[];nbhIdx=0;nbhCenter=null;nbhPending=null;}

let canvassRoute=[],canvassStop=0,routeLines=[],userMarker=null,canvassCenter=null;
function startRoute(){
  document.getElementById('routeScreen').classList.add('open');
  document.getElementById('routeTitle').textContent='Canvass Route';
  document.getElementById('routeSummary').textContent='Getting your location…';
  document.getElementById('routeList').innerHTML='<div class="route-empty">Locating you…</div>';
  document.getElementById('routeFooter').style.display='none';
  if(!navigator.geolocation){const c=map.getCenter();canvassCenter={lat:c.lat,lng:c.lng};fetchRoute();return;}
  navigator.geolocation.getCurrentPosition(pos=>{canvassCenter={lat:pos.coords.latitude,lng:pos.coords.longitude};fetchRoute();},()=>{const c=map.getCenter();canvassCenter={lat:c.lat,lng:c.lng};fetchRoute();},{timeout:6000,maximumAge:30000});
}
function startRouteFor(subdivId,lat,lng){
  canvassCenter={lat:parseFloat(lat),lng:parseFloat(lng)};
  document.getElementById('routeScreen').classList.add('open');
  document.getElementById('routeTitle').textContent='Canvassing Route';

async function fetchRoute(clusterId=''){
  if(!canvassCenter)return;
  const radius=document.getElementById('cpRadius').value,minScore=document.getElementById('cpMinScore').value;
  document.getElementById('routeSummary').textContent='Building route…';
  try{
    const url=`/api/canvass?lat=${canvassCenter.lat}&lng=${canvassCenter.lng}&radius=${radius}&minScore=${minScore}&limit=20${clusterId?'&cluster='+clusterId:''}`;
    const data=await fetch(url).then(r=>r.json());
    canvassRoute=data.route||[];canvassStop=0;renderRoute(data);drawLines();
    if(canvassCenter){
      map.flyTo([canvassCenter.lat,canvassCenter.lng],15,{duration:1});
      if(userMarker)userMarker.remove();
      userMarker=L.marker([canvassCenter.lat,canvassCenter.lng],{icon:L.divIcon({className:'',html:'<div style="width:14px;height:14px;background:#0e0d0c;border-radius:50%;border:2.5px solid #fff;box-shadow:0 2px 10px rgba(0,0,0,.3)"></div>',iconSize:[14,14],iconAnchor:[7,7]})}).addTo(map).bindPopup('📍 You');
    }
  }catch(e){document.getElementById('routeList').innerHTML=`<div class="route-empty">Error: ${e.message}</div>`;}
}
function refreshRoute(){if(canvassCenter)fetchRoute();}
function renderRoute(data){
  const route=data.route||[],footer=document.getElementById('routeFooter');
  if(!route.length){document.getElementById('routeSummary').textContent=`No houses within ${data.radiusM}m with score ≥${data.minScore}`;document.getElementById('routeList').innerHTML='<div class="route-empty">Expand radius or lower min score.</div>';footer.style.display='none';return;}
  document.getElementById('routeSummary').textContent=`${route.length} stops · ${data.radiusM}m radius · score ≥${data.minScore}`;
  document.getElementById('routeList').innerHTML=route.map((s,i)=>{
    const age=s.built?`${CY-s.built}-yr`:'',ten=s.tenure>=10?`${s.tenure}-yr owner`:'',detail=[age,ten,s.distanceLabel].filter(Boolean).join(' · ');
    const sc=s.score>=80?'var(--red)':s.score>=60?'var(--amber)':'var(--green)';
    return`<div class="route-stop${i===canvassStop?' cur':''}${s.contact?' done':''}" onclick="jumpStop(${i})">
      <div class="stop-num">${s.stopNumber}</div>
      <div class="stop-info"><div class="stop-addr">${s.address}</div><div class="stop-detail">${detail}</div></div>
      <div class="stop-right"><div class="stop-score" style="color:${sc}">${s.score}</div><div class="stop-dist">${s.distanceLabel}</div></div>
    </div>`;
  }).join('');
  footer.style.display='block';updateRouteBtn();
}
function updateRouteBtn(){const s=canvassRoute[canvassStop];if(!s)return;document.getElementById('routeNavBtn').textContent=`📍 Navigate — Stop ${s.stopNumber}: ${s.address.split(' ').slice(0,3).join(' ')}…`;}
function jumpStop(idx){canvassStop=idx;document.querySelectorAll('.route-stop').forEach((el,i)=>el.classList.toggle('cur',i===idx));const s=canvassRoute[idx];if(s){map.flyTo([s.lat,s.lng],17,{duration:.6});updateRouteBtn();}}
function navToStop(){const s=canvassRoute[canvassStop];if(!s)return;window.open(`https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lng}&travelmode=driving`,'_blank');}
function drawLines(){routeLines.forEach(l=>l.remove());routeLines=[];if(canvassRoute.length<2)return;const line=L.polyline(canvassRoute.map(s=>[s.lat,s.lng]),{color:'#5941a9',weight:2.5,opacity:.45,dashArray:'5 7',interactive:false}).addTo(map);routeLines.push(line);}
function closeRoute(){document.getElementById('routeScreen').classList.remove('open');routeLines.forEach(l=>l.remove());routeLines=[];if(userMarker){userMarker.remove();userMarker=null;}canvassRoute=[];canvassStop=0;canvassCenter=null;}

function exportCSV(){
  const OLmap={no_answer:'No Answer',not_interested:'Not Interested',quote_given:'Quote Given',job_sold:'Job Sold'};
  const h=['Address','City','ZIP','Built','Roof Age','Owner Tenure','Type','Score','Wave','Contacted','Outcome','Notes','Source','Reason'];
  const rows=LEADS.map(l=>{const t=ownerTenure(l.built,l.lastSale),w=waveLabel(l.score),ol=l.outcome?(OLmap[l.outcome]||l.outcome):'';return[`"${l.address}"`,`"${l.city}"`,l.zip||'',l.built||'',l.built?CY-l.built:'',t||'',l.type,l.score,w.label,l.contact?'Yes':'No',ol,`"${(l.notes||'').replace(/"/g,"'")}"`,`"${l.source||''}"`,`"${l.reason}"`];});
  const csv=[h.join(','),...rows.map(r=>r.join(','))].join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=`roof-leads-${new Date().toISOString().slice(0,10)}.csv`;a.click();showToast(`${LEADS.length} leads exported`);
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';clearTimeout(t._t);t._t=setTimeout(()=>t.style.display='none',2400);}
</script>
</body>
</html>
